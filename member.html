<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XSTARSHOP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: rgba(16,16,16,0.75);
      --surface2: rgba(22,22,22,0.85);
      --surface3: rgba(30,30,30,0.9);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.11);
      --text: #e0e0e0;
      --muted: #555;
    }

    html, body {
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.45) saturate(0.7);
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(177, 177, 177, 0.55) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
      z-index: 1;
    }

    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgb(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--text); }
    .back-btn svg { flex-shrink: 0; }

    .nav-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(170, 170, 170, 0.4);
      text-decoration: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .page {
      position: relative;
      z-index: 2;
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 20px 120px;
    }

    .page-header {
      text-align: center;
      padding: 24px 0 36px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }
    .section-count {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .member-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 480px) {
      .member-list { grid-template-columns: 1fr; }
    }

    .member-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background .18s, border-color .18s, transform .18s;
    }
    .member-row:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .row-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }
    .row-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
      flex: 1;
    }
    .row-role {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .role-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .row-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-socials {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--muted);
      transition: color .2s, border-color .2s, background .2s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .social-icon:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
    }
    .social-icon svg { display: block; }

    @keyframes eqAnim {
      from { transform: scaleY(.3); }
      to   { transform: scaleY(1); }
    }

    .mini-bar {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 7px 14px 7px 7px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      transition: border-color .2s, box-shadow .2s;
      user-select: none;
    }
    .mini-bar:hover {
      border-color: rgb(255, 255, 255);
      box-shadow: 0 14px 44px rgba(54, 54, 54, 0.9);
    }
    .mini-thumb {
      width: 34px; height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #ffffff;
    }
    .mini-info { display: flex; flex-direction: column; min-width: 0; }
    .mini-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      white-space: nowrap; max-width: 140px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .mini-sub {
      font-size: 9px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .mini-eq {
      display: flex; align-items: flex-end;
      gap: 2px; height: 13px; flex-shrink: 0;
    }
    .mini-eq span {
      display: block; width: 2px;
      background: var(--muted); border-radius: 2px;
      animation: eqAnim .75s ease-in-out infinite alternate;
    }
    .mini-eq span:nth-child(1){ height:35%; animation-delay:0s; }
    .mini-eq span:nth-child(2){ height:100%; animation-delay:.12s; }
    .mini-eq span:nth-child(3){ height:55%; animation-delay:.25s; }
    .mini-eq span:nth-child(4){ height:75%; animation-delay:.08s; }
    .mini-eq.paused span { animation-play-state: paused; }

    .expand-card {
      position: fixed;
      bottom: 82px; right: 24px;
      z-index: 499;
      width: 290px;
      background: rgba(12,12,12,0.96);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(68, 67, 67, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }
    .expand-card.open {
      opacity: 1; transform: translateY(0) scale(1); pointer-events: all;
    }
    .exp-art {
      position: relative; width: 100%; aspect-ratio: 1/1;
      background: #0a0a0a; overflow: hidden;
    }
    .exp-art img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; filter: brightness(.75);
      transition: filter .3s;
    }
    .exp-art:hover img { filter: brightness(.9); }
    .exp-art .art-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(8,8,8,.85) 100%);
      pointer-events: none;
    }
    .exp-body {
      padding: 16px 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .exp-track { display: flex; flex-direction: column; gap: 2px; }
    .exp-title { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
    .exp-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
    .exp-prog-wrap { display: flex; flex-direction: column; gap: 5px; }
    .exp-prog-bar {
      height: 3px; background: rgba(255,255,255,0.12);
      border-radius: 99px; cursor: pointer; overflow: hidden;
    }
    .exp-prog-fill {
      height: 100%; background: #fff;
      border-radius: 99px; width: 0%;
      transition: width .5s linear;
    }
    .exp-times { display: flex; justify-content: space-between; }
    .exp-times span { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .exp-controls {
      display: flex; align-items: center;
      justify-content: center; gap: 16px;
    }
    .exp-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: flex; align-items: center;
      justify-content: center; padding: 7px; border-radius: 50%;
      transition: color .2s, background .2s;
    }
    .exp-btn:hover { color: var(--text); background: rgba(255,255,255,.07); }
    .exp-btn.play {
      width: 52px; height: 52px; background: #fff;
      color: #000; border-radius: 50%; transition: transform .15s, background .2s;
    }
    .exp-btn.play:hover { transform: scale(1.06); background: #e8e8e8; }
    .exp-btn svg { display: block; }

    .discord-fab {
      position: fixed;
      bottom: 24px; left: 24px;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 10px 16px 10px 12px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      transition: color .2s, border-color .2s, box-shadow .2s;
    }
    .discord-fab:hover {
      color: #7289da;
      border-color: rgba(114,137,218,0.4);
      box-shadow: 0 8px 32px rgba(114,137,218,.15);
    }
    .discord-fab svg { flex-shrink: 0; }

    @media (max-width: 420px) {
      .expand-card { width: calc(100vw - 28px); right: 14px; }
      .mini-bar { bottom: 14px; right: 14px; }
      .discord-fab { bottom: 14px; left: 14px; }
    }
  </style>
</head>

    const ARTWORK_URL = 'https://cdn.discordapp.com/attachments/1513936934802821365/1516125276386361415/47967bd253d486eeb0addbee4240655a_720w.gif?ex=6a318132&is=6a302fb2&hm=5b3e1d0056a65ab20cbf02d44598e990fd5d59c3d789ce23b88e2c80a6eae47e&';
    const AUDIO_URL   = 'https://files.catbox.moe/c36nuf.mp3';
    // ══════════════════════════════

    const audio    = document.getElementById('audioEl');
    const miniBar  = document.getElementById('miniBar');
    const card     = document.getElementById('expandCard');
    const btnPlay  = document.getElementById('btnPlay');
    const iPlay    = document.getElementById('iPlay');
    const iPause   = document.getElementById('iPause');
    const miniEq   = document.getElementById('miniEq');
    const progFill = document.getElementById('progFill');
    const timeEl   = document.getElementById('timeEl');
    const durEl    = document.getElementById('durEl');
    const progBar  = document.getElementById('progBar');
    let open = false;


    document.getElementById('expTitle').textContent  = SONG_TITLE;
    document.getElementById('expSub').textContent    = SONG_ARTIST;
    document.getElementById('miniTitle').textContent = SONG_TITLE;
    document.getElementById('miniSub').textContent   = SONG_ARTIST;
    document.getElementById('artImg').src    = ARTWORK_URL;
    document.getElementById('miniThumb').src = ARTWORK_URL;
    audio.src = AUDIO_URL;

    function fmt(s) {
      s = s || 0;
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function syncUI() {
      const playing = !audio.paused;
      iPlay.style.display  = playing ? 'none'  : 'block';
      iPause.style.display = playing ? 'block' : 'none';
      miniEq.classList.toggle('paused', !playing);
      if (audio.duration) {
        progFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeEl.textContent = fmt(audio.currentTime);
        durEl.textContent  = fmt(audio.duration);
      }
    }

    audio.addEventListener('timeupdate', syncUI);
    audio.addEventListener('loadedmetadata', syncUI);
    audio.addEventListener('ended', function() { audio.currentTime = 0; audio.play(); });

    audio.play().catch(function() {});

    miniBar.addEventListener('click', function() {
      open = !open;
      card.classList.toggle('open', open);
    });

    btnPlay.addEventListener('click', function(e) {
      e.stopPropagation();
      audio.paused ? audio.play() : audio.pause();
      syncUI();
    });

    document.getElementById('btnPrev').addEventListener('click', function(e) {
      e.stopPropagation();
      audio.currentTime = 0;
    });

    document.getElementById('btnNext').addEventListener('click', function(e) {
      e.stopPropagation();
      audio.currentTime = 0;
    });

    progBar.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!audio.duration) return;
      const r = progBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });
  </script>

</body>
</html>
